<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Letovo Alumni Atlas Gallery</title>
  <style>
    :root {
      --blue: #0d3174;
      --yellow: #fdc300;
      --turquoise: #00adb9;
      --ink: #1d1d1b;
      --gray: #b2b2b2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--ink);
      background: #fff;
    }

    .gallery {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      border: 1px solid rgba(13, 49, 116, 0.16);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .stage {
      position: relative;
      display: grid;
      aspect-ratio: 16 / 10;
      min-height: 0;
      background:
        linear-gradient(135deg, rgba(13, 49, 116, 0.92), rgba(29, 29, 27, 0.78)),
        #0d3174;
    }

    .slide {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    .slide.is-active {
      display: block;
    }

    .empty {
      display: none;
      place-items: center;
      min-height: 320px;
      padding: 28px;
      color: #fff;
      text-align: center;
      font-size: 15px;
      line-height: 1.45;
    }

    .empty.is-visible {
      display: grid;
    }

    .nav {
      position: absolute;
      top: 50%;
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: rgba(13, 49, 116, 0.86);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      cursor: pointer;
      transform: translateY(-50%);
    }

    .nav:hover,
    .nav:focus-visible {
      background: var(--blue);
      outline: 2px solid var(--yellow);
      outline-offset: 2px;
    }

    .prev {
      left: 14px;
    }

    .next {
      right: 14px;
    }

    .dots {
      display: flex;
      gap: 7px;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      border-top: 4px solid var(--yellow);
      background: #fff;
    }

    .dot {
      width: 9px;
      height: 9px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: rgba(13, 49, 116, 0.24);
      cursor: pointer;
    }

    .dot.is-active {
      background: var(--turquoise);
    }

    @media (max-width: 560px) {
      .nav {
        width: 38px;
        height: 38px;
      }
    }
  </style>
</head>
<body>
  <div class="gallery" aria-label="Фотографии Letovo Alumni Atlas">
    <div class="stage" id="stage">
      <div class="empty" id="empty">
        Фотографии скоро появятся здесь. Добавьте файлы gallery-01.jpg ... gallery-06.jpg в assets/form-gallery.
      </div>
      <button class="nav prev" type="button" id="prev" aria-label="Предыдущая фотография">&larr;</button>
      <button class="nav next" type="button" id="next" aria-label="Следующая фотография">&rarr;</button>
    </div>
    <div class="dots" id="dots" aria-label="Выбор фотографии"></div>
  </div>

  <script>
    const photos = [
      { type: "image", src: "assets/form-gallery/gallery-01.jpg?v=2", alt: "Фотография Letovo Alumni Atlas 1" },
      { type: "video", src: "assets/form-gallery/gallery-02.mp4?v=2", alt: "Видео Letovo Alumni Atlas" },
      { type: "image", src: "assets/form-gallery/gallery-03.jpg?v=2", alt: "Фотография Letovo Alumni Atlas 2" },
      { type: "image", src: "assets/form-gallery/gallery-04.jpg?v=2", alt: "Фотография Letovo Alumni Atlas 3" },
      { type: "image", src: "assets/form-gallery/gallery-05.jpg?v=2", alt: "Фотография Letovo Alumni Atlas 4" },
      { type: "image", src: "assets/form-gallery/gallery-06.jpg?v=2", alt: "Фотография Letovo Alumni Atlas 5" },
      { type: "image", src: "assets/form-gallery/gallery-07.png?v=2", alt: "Фотография Letovo Alumni Atlas 6" }
    ];

    const stage = document.getElementById("stage");
    const empty = document.getElementById("empty");
    const dots = document.getElementById("dots");
    const prev = document.getElementById("prev");
    const next = document.getElementById("next");
    const loaded = [];
    let current = 0;

    function render() {
      const hasSlides = loaded.length > 0;
      empty.classList.toggle("is-visible", !hasSlides);
      prev.hidden = !hasSlides;
      next.hidden = !hasSlides;
      dots.hidden = !hasSlides;

      loaded.forEach((photo, index) => {
        const isActive = index === current;
        photo.element.classList.toggle("is-active", isActive);
        if (photo.element.tagName === "VIDEO" && !isActive) {
          photo.element.pause();
        }
      });

      [...dots.children].forEach((dot, index) => {
        dot.classList.toggle("is-active", index === current);
      });
    }

    function go(delta) {
      if (!loaded.length) return;
      current = (current + delta + loaded.length) % loaded.length;
      render();
    }

    photos.forEach((photo) => {
      const element = photo.type === "video" ? document.createElement("video") : new Image();
      element.className = "slide";
      if (photo.type === "video") {
        element.controls = true;
        element.preload = "metadata";
      } else {
        element.alt = photo.alt;
      }

      const addSlide = () => {
        loaded.push({ ...photo, element });
        stage.insertBefore(element, empty);

        const dot = document.createElement("button");
        dot.className = "dot";
        dot.type = "button";
        dot.setAttribute("aria-label", `Слайд ${loaded.length}`);
        dot.addEventListener("click", () => {
          current = loaded.findIndex((item) => item.element === element);
          render();
        });
        dots.appendChild(dot);
        render();
      };

      if (photo.type === "video") {
        element.addEventListener("loadedmetadata", addSlide, { once: true });
      } else {
        element.onload = addSlide;
      }
      element.src = photo.src;
    });

    prev.addEventListener("click", () => go(-1));
    next.addEventListener("click", () => go(1));
    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") go(-1);
      if (event.key === "ArrowRight") go(1);
    });

    render();
  </script>
</body>
</html>
